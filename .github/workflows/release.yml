name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: amd64
            target: linux-amd64
            cmake_flags: ""
          - os: ubuntu-22.04-arm
            arch: arm64
            target: linux-arm64
            cmake_flags: ""
          - os: macos-13
            arch: amd64
            target: darwin-amd64
            cmake_flags: ""
          - os: macos-14
            arch: arm64
            target: darwin-arm64
            cmake_flags: ""
          - os: windows-latest
            arch: amd64
            target: windows-amd64
            cmake_flags: "-DENABLE_OPENCL=OFF"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev ocl-icd-opencl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install openssl --no-progress -y

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DENABLE_OPENCL=${{ runner.os == 'Windows' && 'OFF' || 'ON' }}
          ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/jwt_inspector
          cp build/jwt_inspector dist/jwt_inspector/
          cp -r kernels dist/jwt_inspector/
          cp README.md LICENSE dist/jwt_inspector/
          cd dist && tar czf ../jwt_inspector-${{ matrix.target }}.tar.gz jwt_inspector

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist/jwt_inspector
          cp build/Release/jwt_inspector.exe dist/jwt_inspector/
          cp -r kernels dist/jwt_inspector/
          cp README.md LICENSE dist/jwt_inspector/
          cd dist && 7z a ../jwt_inspector-${{ matrix.target }}.zip jwt_inspector

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jwt_inspector-${{ matrix.target }}
          path: jwt_inspector-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
